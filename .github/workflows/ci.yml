name: CI - notificaciones (unit tests)

on:
  push:
    branches:
      - notificaciones
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests (notificaciones)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin) and enable Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: List pom.xml files (diagnostic)
        run: find . -maxdepth 4 -name pom.xml -print

      - name: Run unit tests (maven)
        run: |
          set -e
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          MODULE_DIR="$GITHUB_WORKSPACE/el-almacen-de-peliculas-online-notificaciones"
          if [ -d "$MODULE_DIR" ]; then
            echo "Running tests in $MODULE_DIR"
            cd "$MODULE_DIR"
            mvn -B -ntp test
          else
            echo "Module directory not found: $MODULE_DIR"
            echo "Listing workspace contents for debugging:"
            ls -la "$GITHUB_WORKSPACE" || true
            find "$GITHUB_WORKSPACE" -maxdepth 4 -name pom.xml -print || true
            exit 1
          fi
