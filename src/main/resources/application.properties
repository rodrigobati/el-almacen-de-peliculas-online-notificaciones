spring.application.name=notificaciones

server.port=${SERVER_PORT:8084}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

rabbitmq.compras.events.exchange=${RABBITMQ_COMPRAS_EVENTS_EXCHANGE:peliculas.eventos.compras}
rabbitmq.compras.compra.confirmada.routing-key=${RABBITMQ_COMPRA_CONFIRMADA_ROUTING_KEY:compra.confirmada.v1}
rabbitmq.notificaciones.compra.confirmada.queue=${RABBITMQ_NOTIFICACIONES_COMPRA_CONFIRMADA_QUEUE:notificaciones.compra-confirmada.v1}
rabbitmq.notificaciones.dlx.exchange=${RABBITMQ_NOTIFICACIONES_DLX_EXCHANGE:peliculas.eventos.dlx}
rabbitmq.notificaciones.compra.confirmada.dlq=${RABBITMQ_NOTIFICACIONES_COMPRA_CONFIRMADA_DLQ:notificaciones.compra-confirmada.v1.dlq}
rabbitmq.notificaciones.compra.confirmada.dlq.routing-key=${RABBITMQ_NOTIFICACIONES_COMPRA_CONFIRMADA_DLQ_ROUTING_KEY:notificaciones.compra-confirmada.v1.dlq}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=true
